# Project-wide Gradle settings.

# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE *should* override this file.

# For more details on how to configure Gradle visit https://docs.gradle.org/current/userguide/build_environment.html

# The value set here will override any default value for this property in the Android Gradle Plugin
android.useAndroidX=true

# Enable Hermes
hermesEnabled=true

# Enable Gradle Daemon
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# Increase network timeouts for CI environments (in milliseconds)
org.gradle.http.timeout=300000
org.gradle.http.connectionTimeout=300000

# Enable parallel builds
org.gradle.parallel=true

# Enable build cache
org.gradle.caching=true
